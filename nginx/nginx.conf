# =============================================================================
# CryptoQuant — Nginx Configuration
# =============================================================================

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept       on;
    use                epoll;
}

http {
    # ── Basics ────────────────────────────────────────────────────────────────
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    charset utf-8;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 4096;
    server_tokens      off;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Gzip Compression ──────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/vnd.ms-fontobject
        application/wasm
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/eot
        font/opentype
        font/otf
        image/bmp
        image/svg+xml
        image/x-icon
        text/cache-manifest
        text/calendar
        text/css
        text/javascript
        text/markdown
        text/plain
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy
        text/xml;

    # ── Rate Limiting ─────────────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=api_limit:10m    rate=60r/m;
    limit_req_zone  $binary_remote_addr zone=login_limit:10m  rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Upstream Definitions ──────────────────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:3000;
        keepalive 16;
    }

    # ── HTTP → redirect all to same host (production: swap with HTTPS) ────────
    server {
        listen      80;
        server_name _;

        client_max_body_size 50M;

        # ── Security headers ────────────────────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"            always;
        # X-XSS-Protection is deprecated; rely on Content-Security-Policy instead
        add_header X-Content-Type-Options    "nosniff"               always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

        # ── Health check (used by load-balancers) ───────────────────────────
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ── REST API ────────────────────────────────────────────────────────
        location /api/ {
            limit_req  zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 20;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_read_timeout  120s;
            proxy_send_timeout  120s;
            proxy_connect_timeout 10s;

            # Strip /api prefix when forwarding (comment out if backend keeps /api)
            # rewrite ^/api/(.*)$ /$1 break;
        }

        # ── Auth endpoints — stricter rate limit ────────────────────────────
        location ~ ^/api/(auth|login|register) {
            limit_req  zone=login_limit burst=5 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ── WebSocket (live market data, order-book, etc.) ──────────────────
        location /ws/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;

            # WebSocket upgrade handshake
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Long-lived connections
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # ── Frontend static assets — aggressive caching ─────────────────────
        location ~* \.(js|css|woff2?|ttf|eot|otf|ico|svg|png|jpg|jpeg|gif|webp|avif|mp4|webm)$ {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   Connection "";

            expires        1y;
            add_header     Cache-Control "public, immutable";
            access_log     off;
        }

        # ── SPA fallback — all other routes served by React ─────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_intercept_errors on;
            error_page 404 = @spa_fallback;
        }

        location @spa_fallback {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   Connection "";
        }
    }
}
