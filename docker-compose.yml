# =============================================================================
# CryptoQuant — Docker Compose
# =============================================================================

x-backend-common: &backend-common
  build:
    context: ./backend
    dockerfile: Dockerfile
  env_file:
    - path: .env
      required: false
  environment:
    DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cryptoquant}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-cryptoquant}
    REDIS_URL: redis://redis:6379/0
    CELERY_BROKER_URL: redis://redis:6379/1
    CELERY_RESULT_BACKEND: redis://redis:6379/2
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cryptoquant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-cryptoquant}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cryptoquant} -d ${POSTGRES_DB:-cryptoquant}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Backend
  # ---------------------------------------------------------------------------
  backend:
    <<: *backend-common
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  celery_worker:
    <<: *backend-common
    command:
      [
        "celery", "-A", "tasks.celery_app", "worker",
        "--loglevel=info",
        "--concurrency=4",
        "--queues=default,high_priority,low_priority",
      ]
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celery_worker_ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s

  celery_beat:
    <<: *backend-common
    command:
      [
        "celery", "-A", "tasks.celery_app", "beat",
        "--loglevel=info",
        "--scheduler", "celery.beat:PersistentScheduler",
      ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
